<!DOCTYPE html>
<html>
<head>
    <title>GMs Karaoke Remote</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { background: #080808; color: white; font-family: 'Outfit', sans-serif; padding: 20px; margin: 0; }
        .container { max-width: 500px; margin: 0 auto; }
        h2 { color: #4169E1; font-size: 24px; margin-bottom: 20px; }
        .search-box { display: flex; gap: 10px; margin-bottom: 20px; }
        input { flex: 1; padding: 12px; background: #1a1a1a; border: 1px solid #333; color: white; border-radius: 6px; outline: none; }
        button { background: #4169E1; color: white; padding: 12px 20px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; }
        #results { display: flex; flex-direction: column; gap: 10px; text-align: left; }
        .result-item { display: flex; align-items: center; gap: 12px; background: #121212; padding: 10px; border: 1px solid #222; border-radius: 8px; cursor: pointer; }
        .result-item img { width: 60px; border-radius: 4px; }
        .result-item div { font-size: 14px; line-height: 1.3; }
        .loader { color: #555; font-size: 14px; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>🎤 GMs REMOTE</h2>

        <div class="search-box">
            <input type="text" id="songQuery" placeholder="Search song or artist...">
            <button onclick="searchSongs()">SEARCH</button>
        </div>

        <div id="results"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // Use the same credentials as your main app
        const SUPABASE_URL = 'https://fllsztziccdfisqaxhyt.supabase.co';
        const SUPABASE_KEY = 'YOUR_ANON_KEY'; // Replace with your real Anon Key
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function searchSongs() {
            const query = document.getElementById('songQuery').value;
            const resultsDiv = document.getElementById('results');
            if(!query) return;

            resultsDiv.innerHTML = '<div class="loader">Searching YouTube...</div>';

            try {
                // We fetch from your own API so we don't leak the YouTube Key on mobile
                const response = await fetch(`/api/search?q=${encodeURIComponent(query)}`);
                const data = await response.json();

                resultsDiv.innerHTML = '';
                data.forEach(video => {
                    const div = document.createElement('div');
                    div.className = 'result-item';
                    div.innerHTML = `
                        <img src="${video.thumbnail}">
                        <div>${video.title}</div>
                    `;
                    div.onclick = () => addToSupabaseQueue(video.id, video.title);
                    resultsDiv.appendChild(div);
                });
            } catch (err) {
                resultsDiv.innerHTML = '<div style="color:red">Search failed.</div>';
            }
        }

        async function addToSupabaseQueue(videoId, title) {
            const singerName = prompt("Who is singing this song?");
            if (!singerName) return; // Cancel if no name given

            const { data, error } = await supabase
                .from('live_queue')
                .insert([
                    {
                        youtube_id: videoId,
                        title: title,
                        singer_name: singerName,
                        is_played: false
                    }
                ]);

            if (error) {
                alert("Error adding to queue: " + error.message);
            } else {
                alert(`Nice! ${title} added for ${singerName}.`);
                document.getElementById('results').innerHTML = '';
                document.getElementById('songQuery').value = '';
            }
        }
    </script>
</body>
</html>
