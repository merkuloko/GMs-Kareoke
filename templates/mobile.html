    <!DOCTYPE html>
    <html>
    <head>
    <title>GMs Karaoke Remote</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
    body { background: #080808; color: white; font-family: 'Outfit', sans-serif; padding: 20px; }
    .search-box { display: flex; gap: 8px; margin-bottom: 20px; }
    input { flex: 1; padding: 12px; background: #1a1a1a; border: 1px solid #333; color: white; border-radius: 6px; }
    button { background: #4169E1; color: white; padding: 12px 20px; border: none; border-radius: 6px; font-weight: bold; }
    .result-item { display: flex; align-items: center; gap: 12px; background: #121212; padding: 10px; border: 1px solid #222; border-radius: 8px; margin-bottom: 10px; text-align: left; }
    .result-item img { width: 60px; border-radius: 4px; }
    </style>
    </head>
    <body>
    <h2 style="color:#4169E1">GMs REMOTE</h2>
    <div class="search-box">
    <input type="text" id="songQuery" placeholder="Search song or artist...">
    <button onclick="searchSongs()">SEARCH</button>
    </div>
    <div id="results"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        let _supabase;

        async function initMobile() {
            try {
                // Using relative path is faster and safer
                const config = await fetch('/api/config').then(res => res.json());
                _supabase = supabase.createClient(config.supabase_url, config.supabase_key);
                console.log("Mobile initialized");
            } catch (e) {
                console.error("Config fetch failed:", e);
            }
        }

        initMobile();

        async function searchSongs() {
            const query = document.getElementById('songQuery').value.trim();
            const resultsDiv = document.getElementById('results');
            if (!query) return;

            // Immediate feedback helps with perceived speed
            resultsDiv.innerHTML = '<div style="color:#4169E1">Connecting to YouTube... 🎤</div>';

            try {
                const apiUrl = `/api/search?q=${encodeURIComponent(query)}`;
                const response = await fetch(apiUrl);

                if (!response.ok) throw new Error('Server busy');

                const data = await response.json();
                resultsDiv.innerHTML = ''; // Clear loading text

                if (data.length === 0) {
                    resultsDiv.innerHTML = '<div style="color:#888">No songs found.</div>';
                    return;
                }

                // MOVED INSIDE: This is where the results actually get built
                data.forEach(video => {
                    const div = document.createElement('div');
                    div.className = 'result-item';
                    div.onclick = () => addToQueue(video.id, video.title);

                    const img = document.createElement('img');
                    img.src = video.thumbnail;

                    const titleDiv = document.createElement('div');
                    titleDiv.textContent = video.title; // XSS Protection

                    div.appendChild(img);
                    div.appendChild(titleDiv);
                    resultsDiv.appendChild(div);
                });
            } catch (e) {
                console.error("Search Error:", e);
                resultsDiv.innerHTML = '<div style="color:#ff4060">Search failed. Try again.</div>';
            }
        }

        async function addToQueue(videoId, title) {
            if (!_supabase) return alert("Connecting to database... try again in a second.");

            const name = prompt("Enter your name:");
            if (!name) return;

            const { error } = await _supabase
                .from('live_queue')
                .insert([{
                    youtube_id: videoId,
                    title: title,
                    singer_name: name
                }]);

            if (error) {
                alert("Error: " + error.message);
            } else {
                alert("Added to queue!");
                document.getElementById('results').innerHTML = '';
                document.getElementById('songQuery').value = '';
            }
        }
    </script>
    </body>
    </html>
